services:
  frontend:
    build: ./frontend
    container_name: frontend_cicd
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - network_cicd

  backend:
    build: ./backend
    container_name: backend_cicd
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/app_cicd
    depends_on:
      - mongo
    networks:
      - network_cicd

  mongo:
    image: mongo:7
    container_name: mongo_cicd
    volumes:
      - mongo_data:/data/db
    networks:
      - network_cicd

networks:
  network_cicd:
    driver: bridge

volumes:
  mongo_data: